<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>一二和布布 · 佳佳的专属小站</title>
  <!-- 强制不使用缓存 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', '幼圆', 'YouYuan', sans-serif;
      background: #fff0f5;
      min-height: 100vh;
      padding: 20px 16px 40px;
      display: flex;
      justify-content: center;
    }
    .container { max-width: 500px; width: 100%; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-size: 36px; color: #ff69b4;
      text-shadow: 2px 2px 0 #ffe4e1;
    }
    .header p { color: #888; margin-top: 5px; }
    .card {
      background: white; border-radius: 24px; padding: 24px;
      margin-bottom: 24px; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.15);
      border: 2px solid #ffe4e1;
    }
    .card h2 { font-size: 24px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .emoji-icon { font-size: 32px; }
    textarea, input[type="text"], input[type="number"] {
      width: 100%; padding: 12px 16px; border: 2px solid #ffb6c1;
      border-radius: 16px; font-size: 16px; outline: none;
      margin-bottom: 12px; background: #fff5f7; font-family: inherit;
    }
    .btn {
      background: #ff69b4; color: white; border: none;
      padding: 12px 24px; border-radius: 30px; font-size: 16px;
      font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
      transition: 0.2s; width: 100%;
    }
    .btn:active { transform: scale(0.95); }
    .btn.reply {
      background: #9370db; width: auto;
      padding: 8px 16px; font-size: 14px;
      box-shadow: 0 4px 10px rgba(147, 112, 219, 0.3);
    }
    .food-list, .wish-list { margin-top: 12px; }
    .food-item, .wish-item {
      background: #fff5f7; padding: 10px 14px; border-radius: 12px;
      margin-bottom: 8px; font-size: 16px; border-left: 4px solid #ff69b4;
    }
    .mood-display {
      text-align: center; font-size: 48px; margin: 12px 0;
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); }
    }
    .call-bubu {
      background: #fff0f5; border-radius: 16px; padding: 16px;
      text-align: center; border: 2px dashed #ff69b4; margin-top: 12px;
    }
    .call-bubu .phone {
      font-size: 22px; font-weight: bold; color: #ff1493; letter-spacing: 2px;
    }
    .reply-date { color: #9370db; font-weight: bold; margin-top: 6px; }
    .reply-input-area {
      display: flex; gap: 10px; align-items: center; margin-top: 8px;
    }
    .reply-input-area input { flex: 1; margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧸 一二 & 布布 🧸</h1>
      <p>佳佳的专属小站，记录每天的小幸福</p>
    </div>

    <div class="card">
      <h2><span class="emoji-icon">🍜</span> 佳佳今天吃什么</h2>
      <textarea id="foodInput" placeholder="写下来吧，今天吃了什么好吃的..." rows="2"></textarea>
      <button class="btn" id="saveFoodBtn">📝 记下来</button>
      <div class="food-list" id="foodList"><p style="color:#888;">还没有记录哦~</p></div>
    </div>

    <div class="card">
      <h2><span class="emoji-icon">😊</span> 佳佳今天的心情</h2>
      <input type="number" id="moodScore" placeholder="给心情打个分 (1-10)" min="1" max="10">
      <button class="btn" id="saveMoodBtn">💖 提交心情</button>
      <div id="moodResult"></div>
    </div>

    <div class="card">
      <h2><span class="emoji-icon">🌟</span> 佳佳的小心愿</h2>
      <textarea id="wishInput" placeholder="写下小心愿，比如想要一朵小花..." rows="2"></textarea>
      <button class="btn" id="saveWishBtn">✨ 许愿</button>
      <div class="wish-list" id="wishList"><p style="color:#888;">还没有心愿哦~</p></div>
    </div>
  </div>

  <script>
    // version: 20260710b - 仅一次声明 supabase
    const SUPABASE_URL = 'https://ojnyiyxnumfdmmelqgmw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_BljRrH1luBU7tmi5SgBucw_YGMnyyni';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadFood() {
      const { data } = await supabase.from('jiajia_food').select('*').order('created_at', { ascending: false }).limit(20);
      const container = document.getElementById('foodList');
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="color:#888;">还没有记录哦~</p>';
        return;
      }
      container.innerHTML = data.map(item => {
        const time = new Date(item.created_at).toLocaleString('zh-CN', { hour12: false });
        return `<div class="food-item">🍽️ ${escapeHtml(item.content)}<br><small style="color:#aaa;">${time}</small></div>`;
      }).join('');
    }

    document.getElementById('saveFoodBtn').addEventListener('click', async () => {
      const content = document.getElementById('foodInput').value.trim();
      if (!content) { alert('写点东西吧~'); return; }
      const { error } = await supabase.from('jiajia_food').insert([{ content }]);
      if (error) { alert('记录失败：' + error.message); return; }
      document.getElementById('foodInput').value = '';
      await loadFood();
    });

    document.getElementById('saveMoodBtn').addEventListener('click', async () => {
      const score = parseInt(document.getElementById('moodScore').value);
      if (isNaN(score) || score < 1 || score > 10) { alert('请输入1到10的分数哦~'); return; }
      const { error } = await supabase.from('jiajia_mood').insert([{ score }]);
      if (error) { alert('提交失败：' + error.message); return; }
      document.getElementById('moodScore').value = '';

      const resultDiv = document.getElementById('moodResult');
      if (score >= 7) {
        resultDiv.innerHTML = `
          <div class="mood-display">😆</div>
          <p style="text-align:center; color:#ff69b4; font-weight:bold;">一二也为你开心！太棒啦！</p>
        `;
      } else if (score < 5) {
        resultDiv.innerHTML = `
          <div class="call-bubu">
            <p style="font-size:24px;">😔 布布来了...</p>
            <p>有不开心的？快联系你的帅气且依靠男友！</p>
            <div class="phone">📞 18789278068</div>
          </div>
        `;
      } else {
        resultDiv.innerHTML = `<p style="text-align:center; color:#666;">今天心情一般般，一二和布布都陪着你~</p>`;
      }
    });

    async function loadWishes() {
      const { data } = await supabase.from('jiajia_wish').select('*').order('created_at', { ascending: false }).limit(20);
      const container = document.getElementById('wishList');
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="color:#888;">还没有心愿哦~</p>';
        return;
      }
      container.innerHTML = data.map(item => {
        const time = new Date(item.created_at).toLocaleString('zh-CN', { hour12: false });
        const replyDate = item.reply_date ? `<div class="reply-date">📅 男友说实现日期：${escapeHtml(item.reply_date)}</div>` : '';
        return `
          <div class="wish-item">
            🌟 ${escapeHtml(item.content)}<br><small style="color:#aaa;">${time}</small>
            ${replyDate}
            <div class="reply-input-area">
              <input type="text" id="replyDate_${item.id}" placeholder="输入实现日期，如 7月15日" style="flex:1;">
              <button class="btn reply" onclick="replyWish(${item.id})">💌 回复日期</button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.replyWish = async function(wishId) {
      const input = document.getElementById('replyDate_' + wishId);
      if (!input) return;
      const dateStr = input.value.trim();
      if (!dateStr) { alert('请输入一个日期哦~'); return; }
      const { error } = await supabase.from('jiajia_wish').update({ reply_date: dateStr }).eq('id', wishId);
      if (error) { alert('回复失败：' + error.message); return; }
      await loadWishes();
    };

    document.getElementById('saveWishBtn').addEventListener('click', async () => {
      const content = document.getElementById('wishInput').value.trim();
      if (!content) { alert('写下小心愿吧~'); return; }
      const { error } = await supabase.from('jiajia_wish').insert([{ content }]);
      if (error) { alert('许愿失败：' + error.message); return; }
      document.getElementById('wishInput').value = '';
      await loadWishes();
    });

    function escapeHtml(text) {
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    loadFood();
    loadWishes();
  </script>
</body>
</html>
